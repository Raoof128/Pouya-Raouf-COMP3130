<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mq_navigation">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mq_navigation</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Workaround for Flutter web assertion failure:
      "!identical(kind, PointerDeviceKind.trackpad) is not true"

    Chrome on macOS sometimes dispatches `pointerdown` events with an empty
    pointerType when the user scrolls or pans with a trackpad. Flutter's web
    engine maps an empty-string pointerType to PointerDeviceKind.trackpad, but
    PointerDownEvent (used for click/tap) asserts that it is NEVER a trackpad
    (trackpad pan/zoom must use PointerPanZoomStartEvent instead).

    We intercept and suppress those spurious pointerdown events at the capture
    phase — before they reach Flutter's canvas — to prevent the assertion crash
    while preserving all normal mouse, touch, and trackpad scroll behaviour.
  -->
  <script>
    (function () {
      window.addEventListener('pointerdown', function (e) {
        if (e.pointerType === '' || e.pointerType === 'unknown') {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, { capture: true, passive: false });
    })();
  </script>

  <!--
    google_maps_config.js is generated locally / in CI and is intentionally
    gitignored. It sets window.GOOGLE_MAPS_API_KEY for web builds without
    committing the key into source control.

    This script reads the key from google_maps_config.js so it is available
    on window.GOOGLE_MAPS_API_KEY before flutter_bootstrap.js runs.
    flutter_bootstrap.js then injects the Maps JS API script and waits for
    it to fully load before starting Flutter, so google_maps_flutter_web
    can access window.google.maps synchronously.
  -->
  <script>
    (function () {
      window.GOOGLE_MAPS_API_KEY = window.GOOGLE_MAPS_API_KEY || "";

      // Read the key from the config file via synchronous XHR.
      // Only the key string is extracted — no dynamic code evaluation.
      try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "google_maps_config.js", false);
        xhr.send();
        if (xhr.status === 200) {
          // Use String.prototype.match (no eval / no Function constructor).
          var parts = xhr.responseText.match(
            /window\.GOOGLE_MAPS_API_KEY\s*=\s*["']([^"']*)["']/
          );
          if (parts && parts[1]) {
            window.GOOGLE_MAPS_API_KEY = parts[1];
          }
        }
      } catch (_) {
        /* File absent or request blocked — continue with empty key. */
      }

      // NOTE: Do NOT inject the Maps JS API here.
      // flutter_bootstrap.js handles loading it and waits for it to finish
      // before starting Flutter (so google_maps_flutter_web works correctly).
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
