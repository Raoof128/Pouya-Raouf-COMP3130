<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mq_navigation">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mq_navigation</title>
  <link rel="manifest" href="manifest.json">

  <!--
    google_maps_config.js is generated locally / in CI and is intentionally
    gitignored. It sets window.GOOGLE_MAPS_API_KEY for web builds without
    committing the key into source control.

    The script below:
    1. Reads the key safely by extracting only the key value via a regex match
       (no arbitrary code evaluation).
    2. If a key is available, injects the Google Maps JavaScript API script tag
       so google_maps_flutter_web can access window.google.maps at widget build
       time. Without this tag the SDK is never loaded, causing:
           TypeError: Cannot read properties of undefined (reading 'maps')
    3. Without a key, the Dart app falls back to the OpenStreetMap renderer.
  -->
  <script>
    (function () {
      window.GOOGLE_MAPS_API_KEY = window.GOOGLE_MAPS_API_KEY || "";

      // Read the key from the config file via synchronous XHR.
      // Only the key string is extracted — no dynamic code evaluation.
      try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "google_maps_config.js", false);
        xhr.send();
        if (xhr.status === 200) {
          // Use String.prototype.match (no eval / no Function constructor).
          var parts = xhr.responseText.match(
            /window\.GOOGLE_MAPS_API_KEY\s*=\s*["']([^"']*)["']/
          );
          if (parts && parts[1]) {
            window.GOOGLE_MAPS_API_KEY = parts[1];
          }
        }
      } catch (_) {
        /* File absent or request blocked — continue with empty key. */
      }

      // Inject the Maps JS API only when a key is present.
      if (window.GOOGLE_MAPS_API_KEY) {
        var s = document.createElement("script");
        s.src =
          "https://maps.googleapis.com/maps/api/js" +
          "?key=" + encodeURIComponent(window.GOOGLE_MAPS_API_KEY) +
          "&libraries=geometry,places&language=en";
        s.defer = false;
        document.head.appendChild(s);
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
